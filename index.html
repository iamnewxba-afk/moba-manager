<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOBA Manager - Team Setup</title>
  <style>
    :root { --primary: #FFB300; --bg: #121214; --surface: #1E1E24; --text: #E0E0E0; --text-secondary: #9E9E9E; }
    body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { background-color: var(--surface); padding: 24px; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4); }
    h2 { color: var(--primary); text-align: center; margin-top: 0; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: var(--text-secondary); }
    input[type="text"], input[type="date"] { width: 100%; padding: 10px; background-color: #2a2a35; border: 1px solid #3a3a45; border-radius: 6px; color: var(--text); box-sizing: border-box; }
    .file-dropzone { border: 2px dashed #424255; padding: 20px; text-align: center; border-radius: 8px; cursor: pointer; background-color: #2a2a35; margin-bottom: 16px; }
    #logoPreview { max-width: 100px; margin: 10px auto; border-radius: 6px; display: none; }
    .roster-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .roster-table td { padding: 8px; border-bottom: 1px solid #2a2a35; font-size: 0.85rem; }
    button { width: 100%; padding: 12px; background-color: var(--primary); color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h2>CREATE TEAM</h2>
    <form id="team-form">
      <div class="form-group"><label>Team Name</label><input type="text" id="teamName" value="Onic Esports PH" required></div>
      <div class="form-group"><label>Short Name</label><input type="text" id="shortName" maxlength="10" value="ONIC PH" required></div>
      <div class="form-group"><label>Manager Name</label><input type="text" id="managerName" placeholder="Enter Name" required></div>
      <div class="form-group"><label>Creation Date</label><input type="date" id="creationDate" required></div>
      <div class="form-group">
        <label>Team Logo</label>
        <div class="file-dropzone" onclick="document.getElementById('teamLogo').click()"><p>Click to Upload Logo</p><input type="file" id="teamLogo" accept="image/*" style="display: none;"></div>
        <img id="logoPreview" src="" alt="Preview">
      </div>
      <div class="form-group">
        <label>Initial Roster</label>
        <table class="roster-table">
          <tbody>
            <tr><td>EXP Laner</td><td><input type="text" id="p_exp" value="Ityh" required /></td></tr>
            <tr><td>Jungler</td><td><input type="text" id="p_jungler" value="Colp" required /></td></tr>
            <tr><td>Mid Laner</td><td><input type="text" id="p_mid" value="Artash" required /></td></tr>
            <tr><td>Gold Laner</td><td><input type="text" id="p_gold" value="Spabroq" required /></td></tr>
            <tr><td>Roamer</td><td><input type="text" id="p_roamer" value="Shed" required /></td></tr>
          </tbody>
        </table>
      </div>
      <button type="submit">Save Team & Enter Dashboard</button>
    </form>
  </div>
  <script>
    document.getElementById('creationDate').valueAsDate = new Date();
    let logoBase64 = "";
    document.getElementById('teamLogo').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => { logoBase64 = event.target.result; document.getElementById('logoPreview').src = logoBase64; document.getElementById('logoPreview').style.display = 'block'; };
        reader.readAsDataURL(file);
      }
    });
    document.getElementById('team-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const teamData = {
        name: document.getElementById('teamName').value,
        manager: document.getElementById('managerName').value,
        logo: logoBase64,
        funds: 10000,
        roster: [
          { role: "EXP Laner", name: document.getElementById('p_exp').value, rank: "Mythic (12★)", pop: "45k", rating: "6.8" },
          { role: "Jungler", name: document.getElementById('p_jungler').value, rank: "Mythical Glory (64★)", pop: "89k", rating: "5.3" },
          { role: "Mid Laner", name: document.getElementById('p_mid').value, rank: "Mythical Immortal (112★)", pop: "240k", rating: "6.2" },
          { role: "Gold Laner", name: document.getElementById('p_gold').value, rank: "Mythical Honor (38★)", pop: "122k", rating: "6.0" },
          { role: "Roamer", name: document.getElementById('p_roamer').value, rank: "Legend IV", pop: "20k", rating: "5.8" }
        ]
      };
      localStorage.setItem('teamData', JSON.stringify(teamData));
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
