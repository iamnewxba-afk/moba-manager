<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MOBA Manager - Team Room</title>
  <style>
    :root { --primary: #FFB300; --bg: #121214; --surface: #1E1E24; --surface-card: #282830; --text: #E0E0E0; --text-secondary: #9E9E9E; --accent: #00E676; }
    body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 1100px; }
    .back-btn { display: inline-block; background: #2a2a35; color: var(--text); padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; margin-bottom: 16px; border: 1px solid #424255; }
    .back-btn:hover { background: var(--primary); color: #000; }
    header { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 16px 24px; border-radius: 12px; margin-bottom: 24px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab-btn { background: var(--surface); color: var(--text-secondary); border: 1px solid #424255; padding: 10px 20px; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: bold; }
    .tab-btn.active { background: var(--surface-card); color: var(--primary); border-bottom-color: transparent; }
    .grid-container { display: grid; grid-template-columns: 1fr 2.5fr 1fr; gap: 20px; }
    .panel { background: var(--surface-card); border-radius: 12px; padding: 20px; border: 1px solid #282830; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; font-size: 0.85rem; border-bottom: 1px solid #32323e; text-align: left; }
    .rank-badge { font-weight: bold; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; background: #4B0082; color: #fff; }
    .btn-action { width: 100%; padding: 10px; background: #2a2a35; color: var(--text); border: 1px solid #424255; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 8px; }
    .btn-action:hover { background: var(--primary); color: #000; }
  </style>
</head>
<body>
  <div class="container">
    <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
    <header>
      <div class="team-info"><h1 id="roomTeamName">Team Name</h1><p>Active Roster</p></div>
      <div class="currency-tag">💰 <span id="roomFunds">0</span> BP</div>
    </header>
    <div class="tabs">
      <button class="tab-btn active" id="btn-roster" onclick="switchTab('roster')">Roster</button>
      <button class="tab-btn" id="btn-activity" onclick="switchTab('activity')">Activity</button>
    </div>
    <div class="grid-container">
      <div class="panel"><h3>Team Stats</h3><p>Reputation: 69%</p><p>Followers: 638K</p></div>
      <div class="panel">
        <div id="rosterTab" class="tab-content active">
          <h3>Roster</h3>
          <table>
            <thead><tr><th>Player</th><th>Role</th><th>Rank</th><th>Pop.</th><th>Rat.</th></tr></thead>
            <tbody id="roster-display"></tbody>
          </table>
        </div>
        <div id="activityTab" class="tab-content">
          <h3>Weekly Schedule</h3>
          <table>
            <thead><tr><th>Day</th><th>Activity</th><th>Outcome</th></tr></thead>
            <tbody>
              <tr><td>Mon</td><td><select><option>Rank Grind</option><option>Rest</option></select></td><td>+3 Stars</td></tr>
              <tr><td>Tue</td><td><select><option>Team Scrim</option><option>Bonding</option></select></td><td>vs BTR Alpha</td></tr>
            </tbody>
          </table>
          <button class="btn-action" style="background: var(--primary); color: #000;" onclick="alert('Saved!')">Save Schedule</button>
        </div>
      </div>
      <div class="panel"><h3>Selection</h3><p id="playerDetail">Select a player to see details.</p></div>
    </div>
  </div>
  <script>
    function switchTab(t){
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(t + 'Tab').classList.add('active');
      document.getElementById('btn-' + t).classList.add('active');
    }
    const data = JSON.parse(localStorage.getItem('teamData'));
    if (data) {
      document.getElementById('roomTeamName').textContent = data.name;
      document.getElementById('roomFunds').textContent = Number(data.funds).toLocaleString();
      const tbody = document.getElementById('roster-display');
      data.roster.forEach(p => {
        tbody.innerHTML += `<tr><td>${p.name}</td><td>${p.role}</td><td><span class="rank-badge">${p.rank}</span></td><td>${p.pop}</td><td>${p.rating}</td></tr>`;
      });
    }
  </script>
</body>
</html>
