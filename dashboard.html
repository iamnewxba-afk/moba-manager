<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MOBA Manager - Dashboard</title>
  <style>
    :root { --primary: #FFB300; --bg: #121214; --surface: #1E1E24; --text: #E0E0E0; --text-secondary: #9E9E9E; }
    body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 800px; }
    header { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 16px 24px; border-radius: 12px; margin-bottom: 24px; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    #displayLogo { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid var(--primary); display: none; }
    .team-info h1 { margin: 0; font-size: 1.5rem; color: var(--primary); }
    .currency-tag { background: #2a2a35; padding: 8px 16px; border-radius: 20px; color: var(--primary); border: 1px solid var(--primary); font-weight: bold; }
    .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 16px; }
    .card { background: var(--surface); border-radius: 12px; padding: 20px; text-align: center; border: 1px solid transparent; transition: 0.2s; cursor: pointer; }
    .card:hover { border-color: var(--primary); transform: translateY(-2px); }
    .card h3 { color: var(--primary); margin-top: 0; }
    .card button { width: 100%; padding: 10px; background: #2a2a35; color: var(--text); border: 1px solid #424255; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .card button:hover { background: var(--primary); color: #000; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <img id="displayLogo" src="" alt="Logo">
        <div class="team-info"><h1 id="displayTeamName">Team Name</h1><p>Manager: <span id="displayManagerName">Name</span></p></div>
      </div>
      <div class="currency-tag">💰 <span id="displayFunds">0</span> BP</div>
    </header>
    <div class="grid-container">
      <div class="card"><h3>Roster Management</h3><p>Assign players and check stats.</p><button onclick="window.location.href='team_room.html'">View Roster</button></div>
      <div class="card"><h3>Tournament Hub</h3><p>Compete in MPL and M-Series.</p><button onclick="window.location.href='tournament_hub.html'">Enter Bracket</button></div>
      <div class="card"><h3>Shop Interface</h3><p>Spend funds on upgrades.</p><button onclick="alert('Shop Coming Soon')">Open Shop</button></div>
      <div class="card"><h3>Settings</h3><p>Save or Reset data.</p><button onclick="alert('Settings Coming Soon')">Game Settings</button></div>
    </div>
  </div>
  <script>
    const data = JSON.parse(localStorage.getItem('teamData'));
    if (data) {
      document.getElementById('displayTeamName').textContent = data.name;
      document.getElementById('displayManagerName').textContent = data.manager;
      document.getElementById('displayFunds').textContent = Number(data.funds).toLocaleString();
      if (data.logo) { document.getElementById('displayLogo').src = data.logo; document.getElementById('displayLogo').style.display = 'block'; }
    }
  </script>
</body>
</html>
